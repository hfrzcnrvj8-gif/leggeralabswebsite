<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Leggera Hub — offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: max(24px, env(safe-area-inset-top)) 24px
          max(24px, env(safe-area-inset-bottom));
        background: #08090a;
        color: #f7f8f8;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          system-ui, sans-serif;
        text-align: center;
      }
      .mark {
        width: 56px;
        height: 56px;
        border-radius: 14px;
      }
      h1 {
        font-size: 17px;
        font-weight: 600;
        margin: 6px 0 0;
      }
      p {
        margin: 0;
        max-width: 22rem;
        font-size: 13.5px;
        line-height: 1.5;
        color: #8a8f98;
      }
      button {
        margin-top: 8px;
        appearance: none;
        border: 1px solid #1f2023;
        background: #0d0e10;
        color: #f7f8f8;
        border-radius: 10px;
        padding: 10px 18px;
        font-size: 13.5px;
        font-weight: 500;
        cursor: pointer;
      }
      button:active {
        background: #1f2023;
      }
    </style>
  </head>
  <body>
    <svg class="mark" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="0" y="0" width="90" height="90" rx="16" fill="#0A0A0A" />
      <rect x="22" y="18" width="13" height="40" fill="#7C3AED" />
      <rect x="22" y="45" width="28" height="13" fill="#7C3AED" />
      <rect x="37" y="30" width="13" height="40" fill="#E0A93B" />
      <rect x="37" y="57" width="31" height="13" fill="#E0A93B" />
    </svg>
    <h1>Brak połączenia</h1>
    <p>
      Leggera Hub działa online — Twoje dane są bezpieczne w chmurze i nie
      przechowujemy ich kopii na telefonie. Połącz się z internetem i spróbuj
      ponownie.
    </p>
    <button onclick="location.reload()">Spróbuj ponownie</button>
  </body>
</html>
