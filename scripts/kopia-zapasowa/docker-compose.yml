# Kopia zapasowa bazy Leggera Hub — do uruchomienia NA NAS-ie (Ugreen DXP4800
# Plus, UGOS Pro → Docker → Projekt/Compose).
#
# ⚠️ NIE uruchamiaj tego na Macu, mimo że Docker tam jest i wszystko ruszy.
# Na Macu kopie powstaną TYLKO wtedy, gdy komputer nie śpi o wyznaczonej
# godzinie — czyli dostaniesz dziury, których nie widać. NAS chodzi non stop
# i dlatego to jego zadanie. Każdy przebieg wpisuje do logu nazwę maszyny,
# żeby dało się to sprawdzić jednym spojrzeniem.
#
# Kontener chodzi non stop i sam budzi się o wyznaczonej godzinie. Nie wymaga
# dostępu do gniazda Dockera ani żadnych podwyższonych uprawnień — widzi tylko
# swój katalog na kopie.
#
# Obraz budujemy z Dockerfile obok (postgres:17 + curl) — powody w tamtym
# pliku. W skrócie: alpine nie ma `openssl` (szyfrowanie), a goły postgres:17
# nie ma `curl` (meldunek do panelu). Oba sprawdzone uruchomieniem.

services:
  kopia-bazy:
    build: .
    image: leggera-kopia-bazy:1
    container_name: leggera-kopia-bazy
    restart: unless-stopped

    environment:
      # Adres bazy TYLKO-DO-ODCZYTU z Neona. Patrz README, krok 1 —
      # NIE wklejaj tu głównego adresu produkcyjnego.
      DATABASE_URL_RO: "${DATABASE_URL_RO}"
      # Hasło szyfrowania kopii. Zgubienie go = kopie są bezużyteczne,
      # więc zapisz je w menedżerze haseł, a nie tylko tutaj.
      HASLO_KOPII: "${HASLO_KOPII}"
      # Godzina (0–23) czasu NAS-a. 3:00 — nikt wtedy nie pracuje,
      # a Neon nie jest obciążony.
      GODZINA_KOPII: "3"
      DNI_DZIENNYCH: "7"
      TYGODNI: "4"
      KATALOG_KOPII: "/kopie"
      TZ: "Europe/Warsaw"
      # Meldunek do panelu po każdym przebiegu — dzięki temu Pulpit wie,
      # czy kopie się robią, a gdy nie, POKAZUJE POWÓD. Bez tych dwóch
      # zmiennych kopie działają dalej, tylko po cichu.
      PANEL_URL: "https://www.leggeralabs.pl"
      BACKUP_PING_SECRET: "${BACKUP_PING_SECRET}"

    volumes:
      - ./kopia.sh:/kopia.sh:ro
      - ./odtworz.sh:/odtworz.sh:ro
      # Nazwa maszyny gospodarza — wewnątrz kontenera `hostname` zwraca jego
      # identyfikator, przez co log i meldunek nie mówiły, GDZIE kopia
      # faktycznie się wykonała.
      - /etc/hostname:/etc/hostname_host:ro
      # Ścieżka na NAS-ie pochodzi z pliku .env (KATALOG_NA_NASIE), a NIE jest
      # wpisana tutaj na stałe. Powód jest praktyczny: ten plik bywa
      # aktualizowany z repozytorium, a wpisana tu ścieżka była już raz
      # nadpisana wartością domyślną (2026-07-20) — kopie zaczęły cicho
      # lądować w zupełnie innym katalogu niż wybrany.
      - ${KATALOG_NA_NASIE:-/volume1/kopie/leggera}:/kopie

    entrypoint: ["/bin/bash", "/kopia.sh", "--petla"]

    # Kontener nie potrzebuje portów ani sieci przychodzącej — łączy się
    # wyłącznie na zewnątrz, do Neona.
    network_mode: bridge
